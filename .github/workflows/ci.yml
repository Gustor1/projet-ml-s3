name: CI — Lint & Test

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main

jobs:
  # -----------------------------------------------------------
  # Job 1: Linting with flake8
  # -----------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run flake8 linter
        run: |
          # Stop on syntax errors or undefined names (critical)
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on style issues (non-blocking, max complexity 10)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

  # -----------------------------------------------------------
  # Job 2: Syntax compilation check
  # -----------------------------------------------------------
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Compile all Python files
        run: python -m compileall . -q

  # -----------------------------------------------------------
  # Job 3: Unit tests with pytest
  # -----------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    needs: [lint, compile]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short || echo "No tests found or tests failed — check test coverage."
